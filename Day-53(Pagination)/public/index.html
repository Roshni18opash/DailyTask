<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Scalable Products API</h2>

<div class="controls">
  <input type="text" id="search" placeholder="Search name" />
  
  <select id="company">
    <option value="">All Companies</option>
    <option value="apple">Apple</option>
    <option value="samsung">Samsung</option>
    <option value="dell">Dell</option>
    <option value="mi">Mi</option>
  </select>

  <select id="sort">
    <option value="">Default</option>
    <option value="price">Price Low → High</option>
    <option value="-price">Price High → Low</option>
    <option value="name">Name A → Z</option>
    <option value="-name">Name Z → A</option>
  </select>

  <input type="number" id="limit" placeholder="Limit" />
  <button onclick="loadProducts()">Apply</button>
</div>

<div id="products"></div>

<div class="pagination">
  <button onclick="prevPage()">Previous</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>
let currentPage = 1;
let totalPages = 1;

async function loadProducts(page = 1) {

  const search = document.getElementById("search").value;
  const company = document.getElementById("company").value;
  const sort = document.getElementById("sort").value;
  const limit = document.getElementById("limit").value || 5;

  let url = `/api/products?page=${page}&limit=${limit}`;

  if (search) url += `&name=${search}`;
  if (company) url += `&company=${company}`;
  if (sort) url += `&sort=${sort}`;

  const res = await fetch(url);
  const data = await res.json();

  currentPage = data.currentPage;
  totalPages = data.totalPages;

  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} of ${totalPages}`;

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.products.forEach(product => {
    container.innerHTML += `
      <div class="card">
        <h4>${product.name}</h4>
        <p>Price: $${product.price}</p>
        <p>Company: ${product.company}</p>
      </div>
    `;
  });
}

function nextPage() {
  if (currentPage < totalPages) {
    loadProducts(currentPage + 1);
  }
}

function prevPage() {
  if (currentPage > 1) {
    loadProducts(currentPage - 1);
  }
}

loadProducts();
</script>

</body>
</html>
